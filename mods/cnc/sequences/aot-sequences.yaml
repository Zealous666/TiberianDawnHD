		RemasteredFilename:
		Length: 1
	aot-ra-idle:
		RemasteredFilename: DATA\ART\TEXTURES\SRGB\RED_ALERT\UNITS\MCV.ZIP
		Facings: 32
		UseClassicFacings: True
# === Ende aotmod ===

# === Ore Mine (aot-ore-mine): RA OREMINE Terrain-Tile als Gebäude-Sprite ===
aot-ore-mine:
	idle:
		Filename: aot-oremine.png
		RemasteredFilename:
		Length: 1
