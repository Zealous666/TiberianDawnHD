# TiberianDawnHD engine overrides (non-aot)
# Diese Datei überschreibt Basis-Aktoren des cnc-Hauptspiels.
# Alle Age-of-Tiberium-Ergänzungen sind mit # === Age of Tiberium (aotmod) === markiert.

^BaseWorld:
	-TerrainRenderer:
	RemasterTerrainRenderer:

STNK:
	Cloak:
		CloakStyle: Alpha

C17:
	Cloak:
		CloakStyle: Alpha

# === Age of Tiberium (aotmod) - HQ: nur GDI + Age-1-Power + EYE-Sprite nach Ion Cannon Upgrade ===
# HQ ist jetzt GDI-exklusiv. NOD bekommt eigenen Radar (aot-nod-radar).
# Ion Cannon Upgrade (aot-age2) schaltet EYE-Sprites frei (kein Ion Cannon Power vorerst).
HQ:
	Buildable:
		Queue: Building.GDI
		Prerequisites: vehicleproduction, ~techlevel.medium
	-AirstrikePower:
	-SupportPowerChargeBar:
	AotAge1Power:
		Actor: aot-age1-marker
		LifeTime: -1
		OneShot: true
		Prerequisites: barracks
		ChargeInterval: 250
		BuildDuration: 25
		Icon: aot-age1
		Name: 1st Tiberium Age
		Description: Unlocks the Tiberium era with new units, buildings and the capability to harvest Tiberium.
		SupportPowerPaletteOrder: 50
	SupportPowerChargeBar:
	ProvidesPrerequisite@gdihq:
		Prerequisite: gdi-hq
	GrantConditionOnPrerequisite@ionupgrade:
		Condition: aot-ion-cannon-active
		Prerequisites: aot-ion-cannon-upgrade
	-WithSpriteBody:
	WithSpriteBody@hq:
		Sequence: idle
		Name: body
		RequiresCondition: !aot-ion-cannon-active
	WithSpriteBody@eye:
		Sequence: aot-eye-idle
		Name: body-eye
		RequiresCondition: aot-ion-cannon-active
	-WithMakeAnimation:
	WithMakeAnimation@aot:
		BodyNames: body, body-eye
		Condition: build-incomplete
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - EYE (GDI): erfordert Age 1 + schaltet Age 2 + Age 3 frei ===
# Advanced Communications Center ist erst baubar nach aot-age1.
# Spiegelt die Nod-TMPL-Logik für GDI.
EYE:
	Buildable:
		Prerequisites: anyhq, ~techlevel.high, aot-age1
		Queue: Building.GDI
	AotAge2Power:
		Actor: aot-age2-marker
		LifeTime: -1
		OneShot: true
		ChargeInterval: 250
		BuildDuration: 25
		Icon: aot-age2
		Name: 2nd Tiberium Age
		Description: Moves forward in the Tiberium technologies with new upgrades and additional equipment.
		SupportPowerPaletteOrder: 51
	AotAge3Power:
		Actor: aot-age3-marker
		LifeTime: -1
		OneShot: true
		Prerequisites: aot-age2
		ChargeInterval: 250
		BuildDuration: 25
		Icon: aot-age3
		Name: 3rd Tiberium Age
		Description: Upgrades to the most advanced Tiberium units, buildings and upgrades.
		SupportPowerPaletteOrder: 52
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - NOD Radar (aot-nod-radar): Age-1-Power für Nod ===
aot-nod-radar:
	AotAge1Power:
		Actor: aot-age1-marker
		LifeTime: -1
		OneShot: true
		Prerequisites: barracks
		ChargeInterval: 250
		BuildDuration: 25
		Icon: aot-age1
		Name: 1st Tiberium Age
		Description: Unlocks the Tiberium era with new units, buildings and the capability to harvest Tiberium.
		SupportPowerPaletteOrder: 50
	SupportPowerChargeBar:
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - TMPL: erfordert Age 1 + schaltet Age 2 + Age 3 frei ===
# Buildable: erst baubar nach aot-age1.
# AGE2 + AGE3 auf TMPL für Nod (Pendant zu EYE für GDI).
TMPL:
	Buildable:
		Prerequisites: anyhq, ~techlevel.high, aot-age1
		Queue: Building.Nod
	AotAge2Power:
		Actor: aot-age2-marker
		LifeTime: -1
		OneShot: true
		ChargeInterval: 250
		BuildDuration: 25
		Icon: aot-age2
		Name: 2nd Tiberium Age
		Description: Moves forward in the Tiberium technologies with new upgrades and additional equipment.
		SupportPowerPaletteOrder: 51
	AotAge3Power:
		Actor: aot-age3-marker
		LifeTime: -1
		OneShot: true
		Prerequisites: aot-age2
		ChargeInterval: 250
		BuildDuration: 25
		Icon: aot-age3
		Name: 3rd Tiberium Age
		Description: Upgrades to the most advanced Tiberium units, buildings and upgrades.
		SupportPowerPaletteOrder: 52
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - Upgrade-Produktionsqueue auf FACT ===
# Fügt dem Bauhof (FACT) eine eigene Produktionswarteschlange für Upgrades hinzu.
# Production@UPGRADE ist zwingend nötig: ProductionQueue.productionTraits sucht
# auf dem selben Aktor nach Production.Produces.Contains("Upgrade"). Ohne diesen
# Trait bleibt Enabled=false und der Tab ist dauerhaft ausgegraut.
# ProductionTabsWidget erkennt diese Queue automatisch wenn FACT gebaut wird.
FACT:
	Production@UPGRADE:
		Produces: Upgrade
		MoveIntoWorld: false
	ProductionQueue@Upgrade:
		Type: Upgrade
		Group: Upgrade
		ReadyAudio: ConstructionComplete
		ReadyTextNotification: notification-construction-complete
		BlockedAudio: NoBuild
		BlockedTextNotification: notification-unable-to-build-more
		QueuedAudio: Building
		OnHoldAudio: OnHold
		CancelledAudio: Cancelled
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - WEAP: eigener Prerequisite-String ===
# vehicleproduction wird auch von AFLD (Nod) bereitgestellt.
# aot-weap stellt sicher, dass MTNK-Upgrades nur mit GDI-Waffenfabrik sichtbar sind.
WEAP:
	ProvidesPrerequisite@aot:
		Prerequisite: aot-weap
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - APC: erst nach APC Upgrade baubar ===
# Verhindert APC-Produktion bis der Spieler das APC Upgrade (Entweder/Oder) kauft.
APC:
	Buildable:
		Prerequisites: lite, ~aot-apc-upgrade, ~!aot-humvee-upgrade
		Queue: LightVehicle.GDI
		Description: Armored Personnel Carrier. Can carry 5 soldiers.
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - MTNK Tier-0: reduzierte HP ===
# Tier 0 (vor Age 1): 33750 HP (= 45000 * 3/4).
# Tier 1+ HP-Scaling per Condition: braucht Custom Trait (TODO, Engine-Patch).
MTNK:
	Health:
		HP: 33750
# === Ende aotmod ===
