# TiberianDawnHD engine overrides (non-aot)
# Diese Datei überschreibt Basis-Aktoren des cnc-Hauptspiels.
# Alle Age-of-Tiberium-Ergänzungen sind mit # === Age of Tiberium (aotmod) === markiert.

^BaseWorld:
	-TerrainRenderer:
	RemasterTerrainRenderer:

STNK:
	Cloak:
		CloakStyle: Alpha

C17:
	Cloak:
		CloakStyle: Alpha

# === Age of Tiberium (aotmod) - HQ: nur GDI + EYE-Sprite nach Ion Cannon Upgrade ===
# HQ ist jetzt GDI-exklusiv. NOD bekommt eigenen Radar (aot-nod-radar).
# Age-Powers liegen auf FACT. Ion Cannon Upgrade schaltet EYE-Sprites frei.
HQ:
	Buildable:
		Queue: Building.GDI
		Prerequisites: vehicleproduction, barracks, ~techlevel.medium
	-AirstrikePower:
	-SupportPowerChargeBar:
	ProvidesPrerequisite@gdihq:
		Prerequisite: gdi-hq
	ProvidesPrerequisite@anyhq:
		Prerequisite: anyhq
	GrantConditionOnPrerequisite@ionupgrade:
		Condition: aot-ion-cannon-active
		Prerequisites: aot-ion-cannon-upgrade
	-WithSpriteBody:
	WithSpriteBody@hq:
		Sequence: idle
		Name: body
		RequiresCondition: !aot-ion-cannon-active
	WithSpriteBody@eye:
		Sequence: aot-eye-idle
		Name: body-eye
		RequiresCondition: aot-ion-cannon-active
	-WithMakeAnimation:
	WithMakeAnimation@aot:
		BodyNames: body, body-eye
		Condition: build-incomplete
	IonCannonPower:
		RequiresCondition: aot-ion-cannon-active
		PauseOnCondition: lowpower
		Prerequisites: ~techlevel.superweapons
		Icon: ioncannon
		Cursor: ioncannon
		ChargeInterval: 9000
		Name: actor-eye.ioncannonpower-name
		Description: actor-eye.ioncannonpower-description
		BeginChargeSpeechNotification: IonCannonCharging
		EndChargeSpeechNotification: IonCannonReady
		SelectTargetSpeechNotification: SelectTarget
		InsufficientPowerSpeechNotification: InsufficientPower
		BeginChargeTextNotification: notification-ion-cannon-charging
		EndChargeTextNotification: notification-ion-cannon-ready
		SelectTargetTextNotification: notification-select-target
		InsufficientPowerTextNotification: notification-insufficient-power
		OnFireSound: ion1.aud
		DisplayRadarPing: True
		CameraActor: camera.small
		SupportPowerPaletteOrder: 20
	SupportPowerChargeBar@ion:
		RequiresCondition: aot-ion-cannon-active
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - EYE: nicht baubar (wird durch HQ+Ion Cannon Upgrade ersetzt) ===
EYE:
	-Buildable:
# === Ende aotmod ===


# === Age of Tiberium (aotmod) - TMPL: erfordert Age 1 ===
# Buildable: erst baubar nach aot-age1.
TMPL:
	Buildable:
		Prerequisites: anyhq, ~techlevel.high, ~aot-age1
		Queue: Building.Nod
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - Upgrade-Queue + Age Super Powers auf FACT ===
# Upgrade-Queue: normale Upgrades (Age 1/2/3 kaufbar hier).
# Super Powers: sichtbar sobald FACT steht, HOLD bis Upgrade gekauft,
#   dann 10 Sek Auto-Countdown, danach auto-fire → spawnt Marker → aot-age1/2/3 aktiv.
FACT:
	Production@UPGRADEGDI:
		Produces: Upgrade.GDI
		MoveIntoWorld: false
	Production@UPGRADENOD:
		Produces: Upgrade.Nod
		MoveIntoWorld: false
	ProductionQueue@UpgradeGDI:
		Type: Upgrade.GDI
		Factions: gdi
		Group: Upgrade
		ReadyAudio: ConstructionComplete
		ReadyTextNotification: notification-construction-complete
		BlockedAudio: NoBuild
		BlockedTextNotification: notification-unable-to-build-more
		QueuedAudio: Building
		OnHoldAudio: OnHold
		CancelledAudio: Cancelled
	ProductionQueue@UpgradeNod:
		Type: Upgrade.Nod
		Factions: nod
		Group: Upgrade
		ReadyAudio: ConstructionComplete
		ReadyTextNotification: notification-construction-complete
		BlockedAudio: NoBuild
		BlockedTextNotification: notification-unable-to-build-more
		QueuedAudio: Building
		OnHoldAudio: OnHold
		CancelledAudio: Cancelled
	SupportPowerChargeBar:
	GrantConditionOnPrerequisite@age1purchased:
		Condition: aot-age1-purchased-cond
		Prerequisites: aot-age1-purchased
	GrantConditionOnPrerequisite@age2purchased:
		Condition: aot-age2-purchased-cond
		Prerequisites: aot-age2-purchased
	GrantConditionOnPrerequisite@age3purchased:
		Condition: aot-age3-purchased-cond
		Prerequisites: aot-age3-purchased
	AotAge1SuperPower:
		Actor: aot-age1-marker
		LifeTime: -1
		OneShot: true
		PauseOnCondition: !aot-age1-purchased-cond
		ChargeInterval: 250
		Icon: aot-age1
		Name: 1st Tiberium Age
		Description: Requires: 1st Tiberium Age Upgrade. The Tiberium era is emerging. New units and buildings are becoming available.
		SupportPowerPaletteOrder: 50
	AotAge2SuperPower:
		Actor: aot-age2-marker
		LifeTime: -1
		OneShot: true
		RequiresCondition: aot-age1-active
		PauseOnCondition: !aot-age2-purchased-cond
		ChargeInterval: 250
		Icon: aot-age2
		Name: 2nd Tiberium Age
		Description: Requires: 2nd Tiberium Age Upgrade. Advanced Tiberium technologies are emerging. New upgrades and equipment becoming available.
		SupportPowerPaletteOrder: 51
	AotAge3SuperPower:
		Actor: aot-age3-marker
		LifeTime: -1
		OneShot: true
		RequiresCondition: aot-age2-active
		PauseOnCondition: !aot-age3-purchased-cond
		ChargeInterval: 250
		Icon: aot-age3
		Name: 3rd Tiberium Age
		Description: Requires: 3rd Tiberium Age Upgrade. Peak Tiberium technology is emerging. The most advanced units and buildings are becoming available.
		SupportPowerPaletteOrder: 52
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - WEAP: Prerequisite + eigener aot-weap-String ===
# vehicleproduction wird auch von AFLD (Nod) bereitgestellt.
# aot-weap stellt sicher, dass MTNK-Upgrades nur mit GDI-Waffenfabrik sichtbar sind.
# ProvidesPrerequisite@buildingname: → stellt "weap" bereit (für Tooltip-Lookup in age2-upgrade-gdi).
WEAP:
	Buildable:
		Prerequisites: lite
		Queue: Building.GDI
	ProvidesPrerequisite@aot:
		Prerequisite: aot-weap
	ProvidesPrerequisite@buildingname:
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - AFLD: Prerequisite auf lite ===
# ProvidesPrerequisite@buildingname: → stellt "afld" bereit (für Tooltip-Lookup in age2-upgrade-nod).
AFLD:
	Buildable:
		Prerequisites: lite
		Queue: Building.Nod
	ProvidesPrerequisite@buildingname:
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - PROC: erst nach Age-1-Upgrade baubar ===
PROC:
	Buildable:
		Prerequisites: ~aot-age1
		Queue: Building.GDI, Building.Nod
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - APC: erst nach APC Upgrade baubar ===
# Verhindert APC-Produktion bis der Spieler das APC Upgrade (Entweder/Oder) kauft.
APC:
	Buildable:
		Prerequisites: lite, ~aot-apc-upgrade, ~!aot-humvee-upgrade
		Queue: LightVehicle.GDI
		Description: Armored Personnel Carrier. Can carry 5 soldiers.
		BuildPaletteOrder: 3
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - MTNK Tier-0: reduzierte HP ===
# Tier 0 (vor Age 1): 33750 HP (= 45000 * 3/4).
# Buildable entfernt → wird über Proxy-Aktoren (aot-mtnk-base/pred/rail) gesteuert.
MTNK:
	Health:
		HP: 33750
	-Buildable:


HTNK:
	-Buildable:

MSAM:
	Buildable:
		Prerequisites: anyhq, ~techlevel.medium, ~aot-age1, aot-age1, weap
		Queue: Vehicle.GDI
		BuildPaletteOrder: 4
# === Ende aotmod ===
