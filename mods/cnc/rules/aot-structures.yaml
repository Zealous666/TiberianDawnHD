# === Age of Tiberium (aotmod) - Light Factory (LITE) ===
# Günstigere Fahrzeugfabrik für GDI & NOD. Nur Powerplant nötig (kein Refinery).
# Sprite: RA War Factory (WEAP.ZIP). Stats wie Barracks (500 Credits, 60000 HP).
# Factions: gdi/nod auf ProductionQueue trennt die Fahrzeug-Tabs sauber (wie FACT).
LITE:
	Inherits: ^BaseBuilding
	Inherits@shape: ^3x2Shape
	Tooltip:
		Name: actor-lite.name
	Valued:
		Cost: 500
	Health:
		HP: 60000
	Buildable:
		BuildPaletteOrder: 38
		Prerequisites: anypower
		Queue: Building.GDI, Building.Nod
		Description: actor-lite.description
	Building:
		Footprint: xxx xxx ===
		Dimensions: 3,3
		LocalCenterOffset: 0,-512,0
	ProvidesPrerequisite:
		Prerequisite: vehicleproduction
	ProvidesPrerequisite@lite:
		Prerequisite: lite
	ProvidesPrerequisite@buildingname:
	RallyPoint:
	CommandBarBlacklist:
		DisableStop: false
	WithBuildingBib:
	WithMakeAnimation:
		Condition: build-incomplete
	RevealsShroud:
		Range: 4c0
	Exit@1:
		SpawnOffset: 0,512,0
		ExitCell: 1,2
		ExitDelay: 3
	Production@GDI:
		Produces: LightVehicle.GDI
	Production@NOD:
		Produces: LightVehicle.Nod
	ProductionQueue@GDI:
		Type: LightVehicle.GDI
		DisplayOrder: 3
		Factions: gdi
		Group: Vehicle
		LowPowerModifier: 150
		ReadyAudio: UnitReady
		ReadyTextNotification: notification-unit-ready
		BlockedAudio: NoBuild
		BlockedTextNotification: notification-unable-to-build-more
		LimitedAudio: BuildingInProgress
		LimitedTextNotification: notification-unable-to-comply-building-in-progress
		QueuedAudio: Training
		OnHoldAudio: OnHold
		CancelledAudio: Cancelled
	ProductionQueue@NOD:
		Type: LightVehicle.Nod
		DisplayOrder: 3
		Factions: nod
		Group: Vehicle
		LowPowerModifier: 150
		ReadyAudio: UnitReady
		ReadyTextNotification: notification-unit-ready
		BlockedAudio: NoBuild
		BlockedTextNotification: notification-unable-to-build-more
		LimitedAudio: BuildingInProgress
		LimitedTextNotification: notification-unable-to-comply-building-in-progress
		QueuedAudio: Training
		OnHoldAudio: OnHold
		CancelledAudio: Cancelled
	ProductionBar@GDI:
		ProductionType: LightVehicle.GDI
	ProductionBar@NOD:
		ProductionType: LightVehicle.Nod
	Power:
		Amount: -20
	RenderSprites:
		Image: lite
	WithSpriteBody:
		Sequence: idle
		Name: body
	WithIdleOverlay@ROOF:
		Sequence: roof
		RequiresCondition: !build-incomplete
	-ActorPreviewPlaceBuildingPreview:
	SequencePlaceBuildingPreview:
		Sequence: place
		SequenceAlpha: 0.65
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - Ore Mine ===
# Neutrales Gebäude, via Map-Editor platziert. Kein Buildable-Trait.
# DockHost Typ "OreLoad" — ORET-Fahrzeug dockt hier an um Erz zu laden.
# Hohe HP = praktisch unzerstörbar (kann später finite Ressourcen erhalten).
aot-ore-mine:
	Inherits: ^Building
	Tooltip:
		Name: actor-aot-ore-mine.name
		GenericName: actor-aot-ore-mine.generic-name
	Building:
		Footprint: x
		Dimensions: 1,1
		TerrainTypes: Clear,Rough,Road,Rock
	Health:
		HP: 99999
	DamageMultiplier:
		Modifier: 0
	StoresResources:
		Capacity: 30
		Resources: Tiberium
	OreMineDurability:
		ResourceType: Tiberium
	DockHost:
		Type: OreLoad
		DockAngle: 0
		DockOffset: -1c0,-1c0,0
	MapEditorData:
		Categories: Neutral
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - FACT: DockHost für ORET-Abladepunkt ===
# ORET fährt zum Construction Yard statt zur Refinery um Credits abzuliefern.
FACT:
	StoresPlayerResources:
		Capacity: 500
	WithResourceStoragePipsDecoration:
		Position: BottomLeft
		Margin: 4, 3
		RequiresSelection: true
		PipCount: 10
		FullSequence: pip-yellow
	DockHost:
		Type: OreDeliver
		DockAngle: 0
		DockOffset: -1c0,1c512,0
	FreeActor:
		Actor: ORET
		SpawnOffset: 0,1
		Facing: 384
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - FACT: RA sprites in Age 0, TD ab Age 1 ===
# Zwei WithSpriteBody (body/body-td) gegenseitig exklusiv via aot-age1-active.
# RA idle = Frame 0 (eingefroren). Keine Build-Placed-Animation — Originalverhalten.
FACT:
	GrantConditionOnPrerequisite@aotage1:
		Condition: aot-age1-active
		Prerequisites: aot-age1
	GrantConditionOnPrerequisite@aotage2:
		Condition: aot-age2-active
		Prerequisites: aot-age2
	GrantConditionOnPrerequisite@aotage3:
		Condition: aot-age3-active
		Prerequisites: aot-age3
	-WithSpriteBody:
	WithSpriteBody@ra:
		Sequence: aot-ra-idle
		Name: body
		RequiresCondition: !aot-age1-active
	WithSpriteBody@td:
		Sequence: idle
		Name: body-td
		RequiresCondition: aot-age1-active
	-WithMakeAnimation:
	WithMakeAnimation@aot:
		BodyNames: body, body-td
		Condition: build-incomplete
	-WithBuildingPlacedAnimation:
	WithBuildingPlacedAnimation@ra:
		Body: body
		Sequence: aot-ra-build
		RequiresCondition: !aot-age1-active
	WithBuildingPlacedAnimation@td:
		Body: body-td
		RequiresCondition: aot-age1-active
# === Ende aotmod ===

# === Age of Tiberium (aotmod) - Age-1-Marker ===
# Unsichtbarer, unzerstörbarer Aktor der von der Age-1-Support-Power gespawnt wird.
# Lebt permanent (LifeTime: -1 in SpawnActorPower) und stellt aot-age1 bereit.
# Keine Render-Traits → unsichtbar auf der Karte.
aot-age1-marker:
	ProvidesPrerequisite:
		Prerequisite: aot-age1

	Selectable:
		Priority: 0
# === Ende aotmod ===

