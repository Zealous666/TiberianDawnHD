# === Age of Tiberium (aotmod) - Recon Jeep: HUMVEE Upgrade ===
# Tier 1 / Entweder-Oder mit APC Upgrade (!aot-apc-upgrade).
# Schaltet HUMVEE-Sprite + stärkeres MG auf dem JEEP frei.
aot-upgrade-humvee:
	Tooltip:
		Name: HUMVEE Upgrade

	Buildable:
		BuildPaletteOrder: 30
		Prerequisites: vehicleproduction, pyle, aot-age1, !aot-apc-upgrade
		Queue: Upgrade
		BuildLimit: 1
		MoveIntoWorld: false
		Description: Upgrades the Recon Jeep with HUMVEE armor and a stronger machine gun. Can carry 1 soldier. Excludes the APC Upgrade.

	Valued:
		Cost: 100

	RenderSprites:
		Image: aot-upgrade-humvee

	ProvidesPrerequisite:
		Prerequisite: aot-humvee-upgrade

	Interactable:

